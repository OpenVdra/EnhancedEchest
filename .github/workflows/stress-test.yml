name: Stress test

# Runs the 450-player storage concurrency/perf/leak simulation (./gradlew stressTest — no
# Minecraft server needed) and renders its report as the job summary. Triggered manually, and
# automatically when a PR touches the storage layer the simulation exercises.
#
# The verdict (failures / deadlock / leak check) is the stable CI signal. Throughput and latency
# depend on the shared runner VM and vary run to run — the workflow deliberately has no
# performance threshold, so a slow runner can never fail the build.

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/main/java/com/enhancedechest/storage/**'
      - 'src/main/java/com/enhancedechest/crossserver/**'
      - 'src/test/java/com/enhancedechest/storage/**'
      - 'build.gradle.kts'
      - '.github/workflows/stress-test.yml'
      - '.github/scripts/stress-summary.sh'

jobs:
  stress:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run stress simulation
        run: |
          chmod +x gradlew
          ./gradlew stressTest --no-daemon

      - name: Render report to job summary
        if: always()
        run: bash .github/scripts/stress-summary.sh build/reports/stress/stress-report.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload stress report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-report-${{ github.run_number }}
          path: |
            build/reports/stress/stress-report.txt
            build/reports/tests/stressTest/
          if-no-files-found: warn
          retention-days: 30
