name: EnhancedEchest
version: '${version}'
main: com.enhancedechest.EnhancedEchestPlugin
bootstrapper: com.enhancedechest.EnhancedEchestBootstrap
api-version: '1.21'
folia-supported: true
author: Nighter
description: Gives every player a double-size ender chest backed by a persistent database

permissions:
  enhancedechest.command.open:
    description: Open the ender chest GUI via command (/enderchest, /eclist). Block right-click never needs this.
    default: op
  # Each admin command gates on its own node; there is no separate base-command permission.
  enhancedechest.admin.reload:
    description: Use /ee reload
    default: op
  enhancedechest.admin.migrate:
    description: Use /ee migrate vanilla, axvaults, playervaultsx and customenderchest
    default: op
  enhancedechest.admin.import:
    description: Use /ee import (copy an old database backend into the active one)
    default: op
  enhancedechest.admin.config:
    description: Use /ee config (edit config.yml from the in-game menu)
    default: op
  enhancedechest.admin.add:
    description: Use /ee add
    default: op
  enhancedechest.admin.resize:
    description: Use /ee resize
    default: op
  enhancedechest.admin.delete:
    description: Use /ee delete
    default: op
  enhancedechest.admin.transfer:
    description: Use /ee transfer (move a player's chests onto another account)
    default: op
  enhancedechest.admin.view:
    description: Open another player's chest
    default: op
  enhancedechest.admin.edit:
    description: Take/add items while viewing another player's chest
    default: op
  enhancedechest.admin.clear:
    description: Empty a chest from the admin view (Clear chest button)
    default: op
