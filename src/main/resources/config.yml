# EnhancedEchest configuration

# Language locale to load from language/<locale>/
# Bundled locales: en_US (English), vi_VN (Tiếng Việt).
# Add your own by copying a folder under language/ and translating it.
language: en_US

enderchest:
  # Slot count of the chest auto-created the first time a player ever opens their ender chest.
  # Must be a multiple of 9, between 9 and 54. Invalid values are rounded to the nearest valid size.
  # Override per player with the enhancedechest.default_size.<size> permission (no config; see docs).
  default-size: 54

  # Which chest-management buttons players may use in the "Edit mode" menu (Rename / Choose icon / Sort).
  # These are GLOBAL switches: they apply to every player the same way, not per-player and not per-chest.
  # Turning one off simply hides its button from the menu; existing names/icons are kept, just no longer
  # editable.
  features:
    # Let players give a chest a custom display name.
    rename: true
    # Let players pick an item to show as a chest's icon in the list.
    icon: true
    # Let players auto-sort a chest's contents: identical items are merged into full stacks and the
    # whole chest is reordered by item type/name. Off by default.
    sort: false
    # Smallest gap between two sorts by the same player, so the Sort button can't be spammed (each sort
    # re-reads and re-writes the chest). Time format: 20s, 5m, 1h, ... Set to 0s to disable the cooldown.
    sort-cooldown: 10s
    # Words players may not use in a chest's custom name (via the Rename button). Matching is
    # case-insensitive and by substring, so "admin" also blocks "iAmAdmin" and "ADMIN". A rename
    # containing any listed word is rejected and the player is asked to choose another. Leave the list
    # empty to allow any name. Clearing a name (saving it blank) is always allowed.
    rename-blacklist:
      - server
      - admin
      - staff
      - owner
    # Let players colour their chest names. When on, names accept legacy '&' colour codes, '&#RRGGBB'
    # hex, and cosmetic MiniMessage tags (<red>, <gradient>, <rainbow>, <bold>, ...). Interactive tags
    # (<click>, <hover>, <insertion>, ...) are ALWAYS stripped, so a name can never run a command or
    # forge a tooltip. When off, names are shown exactly as typed (colour codes appear as plain text).
    # The blacklist above is checked against the visible text, so colour codes can't hide a banned word.
    rename-colors: true

permission-chests:
  # Grant ender chests from permissions of the form:
  #   enhancedechest.additional_amount.<count>.slot.<size>
  #   e.g. enhancedechest.additional_amount.2.slot.54  -> two 54-slot chests.
  # Matching permissions STACK (summed per size). Losing a permission removes exactly that many
  # chests of that size; any items they held spill into a temporary chest (recoverable in /eclist).
  # Synced every time the player opens their ender chest. Players always keep at least one regular
  # (base) chest; permissions never create, delete or override it.
  enabled: true

temp-enderchest:
  # When a chest is shrunk, deleted (without 'force'), or expires with items still inside, those
  # items are moved into a temporary ender chest that disappears once emptied or once it expires.
  #
  # Time format: 20s, 5m, 1h, or complex 1d_2h_30m_15s. Units: s m h d w mo y (mo = 30d, y = 365d).
  # Lifetime of a temp chest created on shrink/delete/expire-with-items.
  expiry: 24h
  # How often the plugin scans for expired chests.
  check-interval: 5m
  # Sound played to a player who tries to deposit into a take-only temporary chest.
  deny-sound:
    # Set to false to play no sound.
    enabled: true
    # Any Minecraft sound id. Default is the villager "no" grunt.
    key: minecraft:entity.villager.no

database:
  # NOTE: changes to the CONNECTION settings in this section (type/file/host/port/database/username/
  # password/ssl/pool-size) require a FULL SERVER RESTART. /ee reload will NOT apply them: the connection
  # pool is built once at startup and is kept on the old settings, because rebuilding it live could
  # drop connections mid-save and risk item dupes. (autosave-interval below IS applied by /ee reload.)
  #
  # Storage backend: sqlite | mysql | mariadb | postgres
  type: sqlite
  # Prepended to every table this plugin creates (e.g. "echest_enderchests"), so its data is easy to
  # tell apart from other plugins' tables and safe to keep in a database shared with them. Letters,
  # digits and underscore only. If you change this on an existing install, the plugin renames its
  # existing tables to match on the next startup.
  table-prefix: echest_
  # Each player's ender chest data is loaded into memory when they join and kept there while they are
  # online; opening/closing chests never queries the database. Changes are written back to the database
  # on this interval, a few seconds after a player quits, and one final time at shutdown. Lower = less
  # data at risk if the server ever crashes hard; higher = fewer database writes. Minimum 30s.
  # Time format: 30s, 5m, 1h, ... (units: s m h d)
  autosave-interval: 5m
  # SQLite: path relative to plugin data folder (default: enderchests.db)
  sqlite-file: enderchests.db
  # MySQL/MariaDB default port: 3306 | Postgres default port: 5432
  host: localhost
  port: 3306
  database: enhancedechest
  username: root
  password: ""
  # TLS mode for a remote MySQL/MariaDB/PostgreSQL connection. Requires a full server restart.
  #   disable      - no encryption (default)
  #   require      - encrypt the connection, but do NOT verify the server certificate or hostname.
  #                  Stops passive snooping, not an active man-in-the-middle.
  #   verify-full  - encrypt AND verify the certificate chain + hostname. The only mode that defends
  #                  against a man-in-the-middle; needs the server's CA to be trusted by the JVM.
  ssl: disable
  pool-size: 10

cross-server:
  # Let SEVERAL servers (e.g. behind a Velocity/BungeeCord proxy) share ONE database safely, so a
  # player's ender chests follow them between servers. Requires BOTH of:
  #   1. database.type mysql/mariadb/postgres, with every server pointing at the SAME database
  #      (and the same table-prefix). SQLite cannot be shared — the plugin refuses to start
  #      cross-server on it.
  #   2. A Redis server reachable by every server (settings below). Redis stores no ender chest
  #      data; it only coordinates which server currently "owns" a player's data, so two servers
  #      can never overwrite each other.
  # Changes here need a FULL SERVER RESTART (like the database connection settings above).
  # When enabled and Redis is unreachable at startup, the plugin disables itself rather than run
  # unsafely. Notes: run /ee import with only one server online; admin commands that target a
  # player who is online on ANOTHER server will fail with an error (open/edit them there instead).
  enabled: false
  # A name for this server, unique across your network (e.g. "survival", "skyblock-2"). Leave empty
  # to auto-generate one at every startup (works fine; a fixed name just makes logs easier to read
  # and recovers locks faster after a crash). NEVER give two servers the same name.
  server-id: ""
  redis:
    host: localhost
    port: 6379
    # Leave empty when Redis has no password.
    password: ""
    # Connect to Redis over TLS. When true, the certificate chain AND hostname are verified against the
    # JVM truststore, so a self-signed certificate must be imported first or the connection will fail.
    ssl: false
    # Redis database number (0-15 on a default Redis install).
    database: 0
    # Prefix for the Redis keys/channel this plugin uses. Only change it if you run several
    # SEPARATE networks on one Redis server (each network gets its own prefix).
    key-prefix: "echest:"

backup:
  # Automatically saves a copy of all ender chest data on a timer, so you can restore it if the
  # database ever gets corrupted or something goes wrong.
  #
  # IMPORTANT: this only works with SQLite (the default storage). If you use mysql/mariadb/postgres,
  # the plugin will NOT back up for you; use your database server's own backup tools instead.
  enabled: true

  # How often to make a backup.
  # Examples: 30m = every 30 minutes, 6h = every 6 hours, 1d = once a day.
  # (units: s = seconds, m = minutes, h = hours, d = days, w = weeks, mo = months, y = years)
  interval: 6h

  # How many backups to keep. Once there are more than this, the OLDEST ones are deleted
  # automatically so the folder doesn't grow forever.
  # Example: 10 keeps your 10 most recent backups. Use 0 to keep ALL backups and never delete any.
  keep: 10

  # Make one extra backup right when the server starts up, on top of the normal timer.
  on-startup: false

  # Folder (inside plugins/EnhancedEchest/) where backup files are saved.
  # Each backup is named like: enderchests-20260625-143000.db  (date and time it was made).
  folder: backups

migration:
  # When true: un-migrated players have their vanilla enderchest imported on join.
  # Note: changing this to true and reloading does NOT migrate players already online.
  # Migration only fires on the join event, so current players must rejoin to be migrated
  # (or use "/ee migrate vanilla <player>" / "/ee migrate vanilla all" for online players).
  enabled: false
