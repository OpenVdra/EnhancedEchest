# ============================================================================
#  Chat messages for EnhancedEchest
#  {prefix} is replaced with the value below. Text uses MiniMessage tags
#  (<red>, <gray>, <#RRGGBB>, ...) and {placeholder} tokens the plugin
#  fills in. Legacy '&' colour codes still load too, so a custom line written
#  the old way keeps working.
# ============================================================================

prefix: '<#9B59B6>EnhancedEchest <dark_gray>⏩ <reset>'

command:
  not-player: '{prefix}Only players can use the ender chest.'

chest:
  load-failed: '{prefix}Could not load your ender chest. Please contact an administrator.'
  not-found: '{prefix}That ender chest no longer exists.'
  # Shown (on the action bar) when a player tries to put an item into a temporary chest.
  temp-take-only: '<red>This is a temporary chest. You can only take items out, not put them in.'
  # Reminder sent on join when the player has items waiting in temporary chest(s) (config
  # temp-enderchest.join-notify). {count} = how many temp chests, {time} = time until the soonest one
  # expires (e.g. "6d 23h"). The chat version below is the full message; the action-bar version is an
  # even shorter one-liner shown at the same time.
  temp-join-chat: '{prefix}<red>You have items in {count} temporary ender chest(s). Collect them before they expire. Soonest in {time}.'
  temp-join-actionbar: '<red>Items in a temporary ender chest. Collect within {time}!'
  # Shown to an admin who tries to open a chest already in use (Folia allows only one viewer per chest).
  in-use: '{prefix}That ender chest is currently in use. Please try again in a moment.'
  # Action bar shown to an admin who may view but not edit another player''s chest (no edit permission).
  view-only: '<gray>Read-only: you can view this chest but not change its contents.'
  # Shown after the Sort button finishes tidying a chest.
  sorted: '{prefix}Chest sorted.'
  # Shown when Sort is clicked again before its cooldown elapses. {time} = remaining time, e.g. "2s".
  sort-cooldown: '{prefix}Please wait {time} before sorting again.'
  # Shown when a rename is rejected because the name contains a word from enderchest.features.rename-blacklist.
  rename-blocked: '{prefix}<red>That name is not allowed. Please choose a different one.'

migrate:
  no-players: '{prefix}No players are online.'
  complete: '{prefix}Migration complete. {migrated} migrated, {skipped} already done.'
  player-offline: '{prefix}{player} is not online.'
  success: '{prefix}Migrated {player} successfully.'
  already-done: '{prefix}{player} was already migrated.'
  failed: '{prefix}Migration failed for {player}. Check the console for details.'
  # Importing from another vault plugin; {source} is the plugin name (AxVaults, PlayerVaultsX).
  no-source: '{prefix}No {source} data found to import.'
  started: '{prefix}Importing vaults from {source}… this runs in the background.'
  import-done: '{prefix}{source} import done. {players} player(s), {vaults} vault(s) imported, {skipped} skipped, {failed} failed.'
  import-player-done: '{prefix}{source} import for {player}: {vaults} vault(s) imported, {skipped} skipped.'
  import-failed: '{prefix}{source} import failed: {error}'

# Database-to-database import (/ee import): copies an old backend into the active one.
import:
  # Validation of the dialog form before anything runs.
  missing-sqlite-file: '{prefix}Enter the SQLite database file to import from.'
  missing-remote-fields: '{prefix}Enter the host, database and username of the source database.'
  invalid-port: '{prefix}The source database port is not valid.'
  invalid-type: '{prefix}Choose a source database type.'
  # Pre-flight guards.
  players-online: '{prefix}Import can only run when no other players are online. Ask everyone else to leave and try again.'
  same-database: '{prefix}The source is the same database the plugin is already using. Point it at the OLD backend instead.'
  dest-not-empty: '{prefix}The active database already has {count} chest(s). Import only works into a fresh, empty database.'
  # Progress + outcome. {source} = chosen type; {players}/{chests} = rows copied.
  started: '{prefix}Importing from the {source} database… this runs in the background.'
  done: '{prefix}Import complete. Copied {players} player(s) and {chests} chest(s) into the active database.'
  failed: '{prefix}Import failed and nothing was written. Reason: {error}'

admin:
  reload-success: '{prefix}Configuration reloaded.'
  player-not-found: '{prefix}Player {player} was not found.'
  no-permission: '{prefix}You do not have permission to do that.'
  # Admin "Clear chest" action from /ee view. {player} = owner, {index} = chest number.
  chest-cleared: '{prefix}Emptied ender chest {index} of {player}.'
  invalid-size: '{prefix}Size must be a multiple of 9 between 9 and 54.'
  invalid-duration: '{prefix}Invalid duration "{duration}". Use a value like 20s, 5m, 1h, 7d, or 1d_2h_30m.'
  chest-not-found: '{prefix}{player} has no ender chest with index {index}.'
  # /ee resize on a permission-granted chest: those are managed by permissions, not admin commands.
  cannot-modify-perm: '{prefix}Ender chest {index} of {player} is granted by a permission and cannot be modified.'
  # /ee resize on the base chest while its size is set by an enhancedechest.default_size.<size> permission.
  cannot-modify-default-size: '{prefix}Ender chest {index} of {player} is sized by a permission and cannot be resized.'
  # /ee view <player>: the target owns no chests yet, so there is nothing to open.
  view-no-chests: '{prefix}{player} does not have any ender chests yet.'
  chest-added: '{prefix}Added ender chest {index} with {size} slots to {player}.'
  chest-added-expiring: '{prefix}Added ender chest {index} with {size} slots to {player}. It will expire in {duration}.'
  chests-added: '{prefix}Added {count} ender chests ({range}) with {size} slots to {player}.'
  chests-added-expiring: '{prefix}Added {count} ender chests ({range}) with {size} slots to {player}. They will expire in {duration}.'
  chest-resized: '{prefix}Resized ender chest {index} of {player} to {size} slots.'
  # /ee delete <player> <count> [force]: removes the newest chests; the first chest is always kept.
  no-chests-deletable: '{prefix}{player} has only their first ender chest, which cannot be deleted.'
  chest-deleted-newest: '{prefix}Deleted the newest ender chest of {player}. Its items were discarded.'
  chest-deleted-newest-spilled: '{prefix}Deleted the newest ender chest of {player}. Any items it held were moved to a temporary chest.'
  chests-deleted-newest: '{prefix}Deleted the {count} newest ender chests of {player}. Their items were discarded.'
  chests-deleted-newest-spilled: '{prefix}Deleted the {count} newest ender chests of {player}. Any items they held were moved to temporary chests.'
  # /ee transfer <from> <to> <index|name|all> [override|temp]: move chests to a switched account.
  transfer-usage: '{prefix}Usage: /ee transfer <from> <to> <#index | name | all> [override | temp].'
  transfer-same-player: '{prefix}The source and destination players must be different.'
  transfer-not-found: '{prefix}{player} has no ender chest matching "{target}".'
  transfer-no-source: '{prefix}{player} has no ender chests to transfer.'
  # Shown when the destination already has items in chests this transfer would replace and no flag was given.
  transfer-needs-flag: '{prefix}{player} already has items in chests this would replace. Add "override" to discard them or "temp" to move them to temporary storage.'
  transfer-failed: '{prefix}The transfer failed. No chests were changed. Please check the console.'
  transfer-complete-all: '{prefix}Transferred all {count} ender chest(s) from {from} to {to}.'
  transfer-complete-one: '{prefix}Transferred {count} ender chest from {from} to {to}.'
  transfer-displaced-temp: '{prefix}{player}''s previous items were moved to temporary storage.'
  transfer-displaced-override: '{prefix}{player}''s previous items were discarded.'

update:
  available: '{prefix}A new update is available. You are on {current}, and the latest is {latest}.'
  # {url} is supplied as a ready-made clickable component from code, so keep it in text position
  # (a placeholder inside a <click:...> attribute is not substituted per-viewer).
  download: '{prefix}<gray>Download: {url}'

# Duration unit labels, used to build the "time remaining" text shown wherever a chest expires
# (the /eclist expiry line, the sort cooldown message, /ee add with a duration, ...). Only the two most
# significant non-zero units are shown, e.g. "1d 4h". {count} is the number; put a space before the unit
# word if your language reads better that way (as vi_VN does). Do not add colour codes here; the text
# inherits the colour of the message it is placed into.
duration:
  year: '{count}y'
  month: '{count}mo'
  week: '{count}w'
  day: '{count}d'
  hour: '{count}h'
  minute: '{count}m'
  second: '{count}s'
